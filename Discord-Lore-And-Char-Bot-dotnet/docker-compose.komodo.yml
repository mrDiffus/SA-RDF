version: '3.8'

services:
  discord-lore-bot:
    image: local/discord-bot:latest
    # 👇 Instructs Docker to compile the application locally on the NUC
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: discord-lore-bot
    restart: unless-stopped
    environment:
      - DOTNET_ENVIRONMENT=Production
      
      # Discord Configuration (Replace with your actual keys)
      - Bot__DiscordToken=YOUR_ACTUAL_DISCORD_TOKEN
      - Bot__DiscordApplicationId=YOUR_APPLICATION_ID
      - Bot__DiscordGuildId=YOUR_OPTIONAL_GUILD_ID
      
      # Gemini API Configuration
      - Bot__GeminiApiKey=YOUR_GEMINI_API_KEY
      - Bot__GeminiModel=gemini-2.5-flash
      
      # Feature Flags
      - Bot__AutoRegisterCommands=true
      - Bot__EnableMessageContentIntent=false
      - Bot__EnableGoogleSearchRetrieval=true
      
      # Data Paths (Matching internal container paths)
      - Bot__DataRoot=/app/public/data
      - Bot__ProfileStorePath=/app/storage/profiles.json
      - Bot__PersonaPath=/app/persona.md
      - Bot__AssetManifestPath=/app/storage/assets_manifest.json
    volumes:
      - /syncs/bot-storage:/app/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"