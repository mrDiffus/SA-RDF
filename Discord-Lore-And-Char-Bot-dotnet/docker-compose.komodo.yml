services:
  discord-lore-bot:
    image: local/discord-bot:latest-latest
    container_name: discord-lore-bot
    restart: unless-stopped
    environment:
      - DOTNET_ENVIRONMENT=Production
      - Bot__DiscordToken=${Bot__DiscordToken}
      - Bot__DiscordApplicationId=${Bot__DiscordApplicationId}
      - Bot__DiscordGuildId=${Bot__DiscordGuildId:-}
      - Bot__GeminiApiKey=${Bot__GeminiApiKey}
      - Bot__GeminiModel=${Bot__GeminiModel:-gemini-3.1-flash-lite-preview}
      - Bot__AutoRegisterCommands=${Bot__AutoRegisterCommands:-true}
      - Bot__EnableMessageContentIntent=${Bot__EnableMessageContentIntent:-false}
      - Bot__EnableGoogleSearchRetrieval=${Bot__EnableGoogleSearchRetrieval:-true}
      - Bot__DataRoot=/app/public/data
      - Bot__ProfileStorePath=/app/storage/profiles.json
      - Bot__PersonaPath=/app/persona.md
      - Bot__AssetManifestPath=/app/storage/assets_manifest.json
    volumes:
      - /syncs/bot-storage:/app/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"