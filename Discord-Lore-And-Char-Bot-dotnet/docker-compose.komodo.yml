services:
  discord-lore-bot:
    image: local/discord-bot:latest-latest
    container_name: discord-lore-bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DOTNET_ENVIRONMENT=Production
      - Bot__DiscordToken=${Bot__DiscordToken:?set Bot__DiscordToken}
      - Bot__DiscordApplicationId=${Bot__DiscordApplicationId:?set Bot__DiscordApplicationId}
      - Bot__DiscordGuildId=${Bot__DiscordGuildId:-}
      - Bot__GeminiApiKey=${Bot__GeminiApiKey:?set Bot__GeminiApiKey}
      - Bot__GeminiModel=${GEMINI_MODEL:-gemini-3.1-flash-lite-preview}
      - Bot__AutoRegisterCommands=${AUTO_REGISTER_COMMANDS:-true}
      - Bot__EnableMessageContentIntent=${ENABLE_MESSAGE_CONTENT_INTENT:-false}
      - Bot__EnableGoogleSearchRetrieval=${ENABLE_GOOGLE_SEARCH_RETRIEVAL:-true}
      - Bot__DataRoot=/app/public/data
      - Bot__ProfileStorePath=/app/storage/profiles.json
      - Bot__PersonaPath=/app/persona.md
      - Bot__AssetManifestPath=/app/storage/assets_manifest.json
    volumes:
      - /syncs/bot-storage:/app/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"